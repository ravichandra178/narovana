kind = "web"
previewPath = "/"
title = "Portfolio Narovana"
version = "1.0.0"
id = "artifacts/portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21113

[services.development]
run = "pnpm --filter @workspace/portfolio run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/portfolio", "run", "build"]

[services.production.build.env]
PORT = "21113"
BASE_PATH = "/"
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/portfolio", "run", "serve"]

[services.production.run.env]
PORT = "21113"
BASE_PATH = "/"
NODE_ENV = "production"

[services.env]
PORT = "21113"
BASE_PATH = "/"
